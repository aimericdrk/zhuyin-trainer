    <!-- No-flash theme bootstrap -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('zhuyin.theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = (saved === 'light' || saved === 'dark') ? saved : (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <noscript>
      <header>
        <h1>Zhuyin Trainer · Learn Bopomofo (ㄅㄆㄇㄈ) with Pinyin and Tones</h1>
      </header>
      <main>
        <p>
          <strong>Zhuyin Trainer</strong> is a free interactive web app for practicing the
          Zhuyin (Bopomofo, 注音符號) phonetic system used in Taiwan to teach Mandarin
          pronunciation.
        </p>
        <p>
          The trainer offers two modes:
        </p>
        <ul>
          <li>
            <strong>Easy mode</strong> — see a pinyin syllable (e.g. <em>ma</em>) and select
            the matching zhuyin symbols (ㄇㄚ) on an on-screen keyboard.
          </li>
          <li>
            <strong>Hard mode</strong> — see a real Chinese character with its tone-marked
            pinyin (e.g. 媽 / mā) and type the full zhuyin sequence including the tone mark.
          </li>
        </ul>
        <p>
          Every character is paired with an English (or French) meaning, an example
          Chinese sentence, a word-by-word breakdown with pinyin and zhuyin, and a full
          translation.
        </p>
        <p>
          The app requires JavaScript. Please enable it in your browser to start
          practicing.
        </p>
        <p>
          Keywords: zhuyin, bopomofo, ㄅㄆㄇㄈ, pinyin to zhuyin, learn bopomofo,

        </p>
      </main>
